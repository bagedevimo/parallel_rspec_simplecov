# .github/workflows/push_gem.yml
on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  id-token: write

jobs:
  push:
    name: Push gem to RubyGems.org
    runs-on: ubuntu-latest
    steps:
      # Set up
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: ruby

      # Release
      - uses: rubygems/release-gem@v1
